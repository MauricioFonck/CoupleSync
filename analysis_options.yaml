# Static analysis configuration for CoupleSync.
# Run with `flutter analyze`.
include: package:flutter_lints/flutter.yaml

analyzer:
  # Generated code (Freezed / json_serializable) is excluded from analysis.
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/firebase_options.dart"
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Correctness rules promoted to errors.
    # Prohíbe imports relativos que crucen el límite del paquete vía lib/.
    # Dentro de lib/ se usan imports relativos intra-capa (idiomático).
    avoid_relative_lib_imports: error

linter:
  rules:
    # Style / safety hardening on top of flutter_lints.
    prefer_single_quotes: true
    prefer_final_locals: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    require_trailing_commas: true
    unawaited_futures: true
    # Desactivado a propósito: mapeamos parámetros named públicos a campos
    # privados (`: _x = x`) en casos de uso/servicios; un formal privado no es
    # válido como argumento named, así que el idioma es intencional.
    prefer_initializing_formals: false
    avoid_print: true
    directives_ordering: true
    sort_pub_dependencies: false

# NOTE (arquitectura hexagonal): la pureza de `lib/domain/**` (que NO importe
# Flutter/Firebase/Riverpod) se verifica con un test de arquitectura en la Fase 12.
# Ver docs/ARCHITECTURE.md.
